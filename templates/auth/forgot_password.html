{% extends 'base.html' %}
{% block title %}Forgot password · AstroAi{% endblock %}
{% block content %}
<section class="auth-shell card glass reveal-up narrow polished-auth">
  <div>
    <span class="eyebrow">MVP password reset</span>
    <h1>Forgot your password?</h1>
    <p class="muted">This flow is ready for future email delivery. For now, AstroAi creates a reset token server-side and surfaces it clearly in the UI.</p>
  </div>
  <form method="post" class="form-grid app-form">
    <label>Email<input type="email" name="email" required /></label>
    <button class="primary-button" type="submit">Generate reset token</button>
  </form>
</section>
{% endblock %}
