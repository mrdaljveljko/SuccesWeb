{% extends 'base.html' %}
{% block title %}Login · AstroAi{% endblock %}
{% block content %}
<section class="auth-shell card glass reveal-up narrow polished-auth">
  <div>
    <span class="eyebrow">Welcome back</span>
    <h1>Log in to continue your streak</h1>
    <p class="muted">Return to your dashboard, check what’s available today, and keep your Astro Tokens growing.</p>
  </div>
  <form method="post" class="form-grid app-form">
    <label>Email<input type="email" name="email" required /></label>
    <label>Password<input type="password" name="password" required /></label>
    <button class="primary-button" type="submit">Log in</button>
  </form>
  <a class="inline-link" href="{{ url_for('forgot_password') }}">Forgot password?</a>
</section>
{% endblock %}
